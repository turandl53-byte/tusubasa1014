<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tvvitter</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#fff;color:#0f1419;display:flex;justify-content:center}
        .sol-menu{width:275px;padding:10px 20px;position:sticky;top:0;height:100vh}
        .logo{font-size:30px;padding:12px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer}
        .logo:hover{background:#e8e8e8}
        .menu-item{display:flex;align-items:center;gap:16px;padding:12px 16px;font-size:19px;border-radius:30px;cursor:pointer;margin:3px 0}
        .menu-item:hover{background:#e8e8e8}
        .ana-icerik{width:600px;border-left:1px solid #cfd9de;border-right:1px solid #cfd9de;min-height:100vh}
        .ust-baslik{padding:15px 20px;font-size:20px;font-weight:bold;border-bottom:1px solid #cfd9de;position:sticky;top:0;background:rgba(255,255,255,0.85);z-index:10}
        .paylasim-alani{padding:12px 16px;border-bottom:1px solid #cfd9de;display:flex;gap:12px}
        .avatar{width:42px;height:42px;border-radius:50%;background:#1d9bf0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;flex-shrink:0}
        .paylasim-icerik{flex:1}
        .paylasim-input{width:100%;background:transparent;border:none;color:#0f1419;font-size:19px;padding:12px 0;outline:none;resize:none;font-family:inherit}
        .paylasim-input::placeholder{color:#536471}
        .medya-butonlar{display:flex;gap:5px;padding:8px 0}
        .medya-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;color:#1d9bf0;font-size:18px;cursor:pointer}
        .medya-btn:hover{background:#031018}
        .sifre-input{width:100%;background:#eff3f4;border:1px solid #cfd9de;border-radius:20px;color:#0f1419;padding:10px 16px;font-size:14px;outline:none;margin:8px 0}
        .gonder-btn{background:#1d9bf0;color:#fff;border:none;padding:10px 20px;border-radius:25px;font-size:15px;font-weight:bold;cursor:pointer;float:right;margin-top:8px}
        .hata-yazisi{color:#f4212e;font-size:13px;margin-top:5px;display:none}
        .tweet{padding:16px;border-bottom:1px solid #cfd9de;display:flex;gap:12px;cursor:pointer}
        .tweet:hover{background:#f7f7f7}
        .tweet-avatar{width:42px;height:42px;border-radius:50%;background:#1d9bf0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;flex-shrink:0}
        .tweet-icerik{flex:1}
        .tweet-ust{display:flex;gap:5px;align-items:center;margin-bottom:3px}
        .tweet-isim{font-weight:bold;font-size:15px}
        .tweet-kullanici,.tweet-zaman{color:#71767b;font-size:14px}
        .tweet-yazi{font-size:15px;line-height:1.4;margin:5px 0;word-break:break-word}
        .tweet-medya{max-width:100%;max-height:400px;border-radius:16px;margin-top:10px;border:1px solid #2f3336;cursor:pointer}
        .tweet-video{max-width:100%;max-height:400px;border-radius:16px;margin-top:10px;background:#000;cursor:pointer}
        .tweet-butonlar{display:flex;justify-content:space-between;margin-top:10px;max-width:400px}
        .tweet-btn{display:flex;align-items:center;gap:6px;color:#71767b;font-size:13px;cursor:pointer;padding:5px;border-radius:20px;border:none;background:transparent}
        .tweet-btn:hover{color:#1d9bf0;background:#031018}
        .sag-menu{width:350px;padding:10px 20px}
        .arama-kutusu{width:100%;background:#eff3f4;border:1px solid #cfd9de;border-radius:25px;color:#0f1419;padding:12px 20px;font-size:15px;outline:none;margin-top:5px}
        .trend-kutusu{background:#eff3f4;border-radius:16px;margin-top:15px;padding:12px 16px}
        .trend-baslik{font-weight:bold;font-size:20px;margin-bottom:12px}
        .trend-item{padding:10px 0;cursor:pointer}
        .trend-item:hover{background:#e8e8e8;margin:0 -16px;padding:10px 16px}
        .trend-kategori{font-size:13px;color:#71767b}
        .trend-etiket{font-weight:bold;font-size:15px;margin:3px 0}
        .trend-sayi{font-size:13px;color:#71767b}
        #resimSec,#videoSec{display:none}
        .onizleme-container{position:relative;margin:10px 0}
        .onizleme-medya{max-width:100%;max-height:300px;border-radius:16px;display:none}
        .onizleme-kapat{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:none}
    </style>
</head>
<body>

<div class="sol-menu">
    <div class="logo">🐦 Tvvitter </div>
    <div class="menu-item">🏠 Ana Sayfa</div>
    <div class="menu-item">🔍 Keşfet</div>
    <div class="menu-item">🔔 Bildirimler</div>
    <div class="menu-item">✉️ Mesajlar</div>
    <div class="menu-item">👤 Profil</div>
    <div class="menu-item">(...) Daha Fazla</div>

</div>

<div class="ana-icerik">
    <div class="ust-baslik">Ana Sayfa</div>
    <button id="paylasimAc" style="width:100%;padding:15px;background:#1d9bf0;color:#fff;border:none;border-radius:25px;font-size:17px;font-weight:bold;cursor:pointer;margin:10px 0;display:block" onclick="document.getElementById('paylasimAlani').style.display='flex';this.style.display='none'">✚ Yeni Gönderi</button>
    <div class="paylasim-alani" id="paylasimAlani" style="display:none">
        <div class="avatar">👤</div>
        <div class="paylasim-icerik">
            <input type="text" class="paylasim-input" id="kullaniciAdi" placeholder="Kullanıcı Adı:" maxlength="30">
            <textarea class="paylasim-input" id="tweetIcerik" placeholder="Neler oluyor?" maxlength="280" rows="2"></textarea>
            
            <div class="onizleme-container">
                <img class="onizleme-medya" id="resimOnizleme" src="">
                <video class="onizleme-medya" id="videoOnizleme" controls preload="auto"></video>
                <button class="onizleme-kapat" id="onizlemeKapat" onclick="medyaTemizle()">✕</button>
            </div>
            
            <div class="medya-butonlar">
                <button class="medya-btn" onclick="document.getElementById('resimSec').click()">🖼️</button>
                <button class="medya-btn" onclick="document.getElementById('videoSec').click()">🎬</button>
            </div>
            
            <input type="file" id="resimSec" accept="image/*" onchange="medyaOnizle('resim')">
            <input type="file" id="videoSec" accept="video/*" onchange="medyaOnizle('video')">
            
            <input type="password" class="sifre-input" id="adminSifre" placeholder="🔒 Admin Şifresi :" maxlength="30">
            
            <button class="gonder-btn" onclick="tweetGonder()">Gönder</button>
   <button onclick="document.getElementById('paylasimAlani').style.display='none';document.getElementById('paylasimAc').style.display='block'" style="background:#536471;color:#fff;border:none;padding:10px 20px;border-radius:25px;font-size:15px;cursor:pointer;float:right;margin-top:8px;margin-left:5px">İptal</button>        
 <div class="hata-yazisi" id="hataYazisi"></div>
        </div>
    </div>
    
    <div id="tweetListesi"></div>
</div>

<div class="sag-menu">
    <input type="text" class="arama-kutusu" placeholder="Tvvitter'da ara">
    <div class="trend-kutusu">
        <div class="trend-baslik">Gündemdekiler</div>
        <div class="trend-item"><div class="trend-etiket">#Tvvitter</div><div class="trend-sayi">1.234 gönderi</div></div>
        <div class="trend-item"><div class="trend-etiket">#YapayZeka</div><div class="trend-sayi">5.678 gönderi</div></div>
        <div class="trend-item"><div class="trend-etiket">#Futbol</div><div class="trend-sayi">12.345 gönderi</div></div>
        <div class="trend-item"><div class="trend-etiket">#ALPAGUWAR</div><div class="trend-sayi">25.538 gönderi</div></div>
        <div class="trend-item"><div class="trend-etiket">#bednamgündem</div><div class="trend-sayi">27.942 gönderi</div></div>

    </div>
</div>

<div id="medyaModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:9999;cursor:pointer" onclick="medyaKapat()">
    <img id="buyukResim" src="" style="display:none;max-width:95%;max-height:95%;border-radius:12px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none">
    <video id="buyukVideo" controls preload="auto" style="display:none;max-width:95%;max-height:95%;border-radius:12px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)"></video>
</div>

<script>
let secilenResim = null;
let secilenVideo = null;

tweetleriYukle();
setInterval(tweetleriYukle, 5000);

function medyaOnizle(tur) {
    const input = document.getElementById(tur === 'resim' ? 'resimSec' : 'videoSec');
    const dosya = input.files[0];
    if (!dosya) return;
    const okuyucu = new FileReader();
    okuyucu.onload = function(e) {
        if (tur === 'resim') {
            document.getElementById('resimOnizleme').src = e.target.result;
            document.getElementById('resimOnizleme').style.display = 'block';
            document.getElementById('videoOnizleme').style.display = 'none';
            secilenResim = dosya;
            secilenVideo = null;
            document.getElementById('videoSec').value = '';
        } else {
            document.getElementById('videoOnizleme').src = e.target.result;
            document.getElementById('videoOnizleme').style.display = 'block';
            document.getElementById('resimOnizleme').style.display = 'none';
            secilenVideo = dosya;
            secilenResim = null;
            document.getElementById('resimSec').value = '';
        }
        document.getElementById('onizlemeKapat').style.display = 'block';
    };
    okuyucu.readAsDataURL(dosya);
}

function medyaTemizle() {
    secilenResim = null;
    secilenVideo = null;
    document.getElementById('resimOnizleme').src = '';
    document.getElementById('resimOnizleme').style.display = 'none';
    document.getElementById('videoOnizleme').src = '';
    document.getElementById('videoOnizleme').style.display = 'none';
    document.getElementById('onizlemeKapat').style.display = 'none';
    document.getElementById('resimSec').value = '';
    document.getElementById('videoSec').value = '';
}

function tweetleriYukle() {
    var videolar = document.querySelectorAll('video');
    var oynuyor = false;
    videolar.forEach(function(v) {
        if (!v.paused && !v.ended) oynuyor = true;
    });
    if (oynuyor) return;

    fetch('/mesajlar').then(function(r) { return r.json(); }).then(function(veri) {
        var html = '';
        veri.forEach(function(tweet) {
            html += '<div class="tweet"><div class="tweet-avatar">' + tweet.kullanici.charAt(0).toUpperCase() + '</div><div class="tweet-icerik"><div class="tweet-ust"><span class="tweet-isim">' + tweet.kullanici + '</span><span class="tweet-kullanici">@' + tweet.kullanici.toLowerCase() + '</span><span class="tweet-zaman">· ' + tweet.zaman + '</span></div><div class="tweet-yazi">' + tweet.icerik + '</div>';
            if (tweet.resim) {
                html += '<img class="tweet-medya" src="' + tweet.resim + '" onclick="event.stopPropagation();resimAc(\'' + tweet.resim + '\')" onerror="this.style.display=\'none\'">';
            }
            if (tweet.video) {
                html += '<video class="tweet-video" controls preload="auto" playsinline src="' + tweet.video + '" onclick="event.stopPropagation();videoAc(\'' + tweet.video + '\')"></video>';
            }
            html += '<div class="tweet-butonlar"><button class="tweet-btn">💬 ' + Math.floor(Math.random()*30) + '</button><button class="tweet-btn">🔄 ' + Math.floor(Math.random()*50) + '</button><button class="tweet-btn">❤️ ' + Math.floor(Math.random()*100) + '</button><button class="tweet-btn">📊 ' + Math.floor(Math.random()*5000) + '</button></div></div></div>';
        });
        document.getElementById('tweetListesi').innerHTML = html;
    });
}

function tweetGonder() {
    const kullanici = document.getElementById('kullaniciAdi').value || 'Anonim';
    const icerik = document.getElementById('tweetIcerik').value;
    const sifre = document.getElementById('adminSifre').value;
    const hataDiv = document.getElementById('hataYazisi');
    
    if (!icerik.trim() && !secilenResim && !secilenVideo) {
        hataDiv.textContent = 'Lütfen bir şey yazın veya medya ekleyin';
        hataDiv.style.display = 'block';
        return;
    }
    if (!sifre) {
        hataDiv.textContent = 'Kullanıcı adı ve şifre gerekli!';
        hataDiv.style.display = 'block';
        return;
    }
    
    const formData = new FormData();
    formData.append('kullanici', kullanici);
    formData.append('icerik', icerik);
    formData.append('sifre', sifre);
    if (secilenResim) formData.append('resim', secilenResim);
    if (secilenVideo) formData.append('video', secilenVideo);
    
    fetch('/gonder', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(veri => {
        if (veri.durum === 'hata') {
            hataDiv.textContent = veri.mesaj;
            hataDiv.style.display = 'block';
        } else {
            document.getElementById('tweetIcerik').value = '';
            hataDiv.style.display = 'none';
            medyaTemizle();
            tweetleriYukle();
            document.getElementById('paylasimAlani').style.display = 'none';
            document.getElementById('paylasimAc').style.display = 'block';
        }
    });
}

function resimAc(url) {
    document.getElementById('buyukVideo').style.display = 'none';
    document.getElementById('buyukVideo').pause();
    document.getElementById('buyukVideo').src = '';
    document.getElementById('buyukResim').src = url;
    document.getElementById('buyukResim').style.display = 'block';
    document.getElementById('medyaModal').style.display = 'block';
}

function videoAc(url) {
    document.getElementById('buyukResim').style.display = 'none';
    var vid = document.getElementById('buyukVideo');
    vid.src = url;
    vid.style.display = 'block';
    vid.load();
    vid.play();
    document.getElementById('medyaModal').style.display = 'block';
}

function medyaKapat() {
    document.getElementById('medyaModal').style.display = 'none';
    var vid = document.getElementById('buyukVideo');
    vid.pause();
    vid.src = '';
    vid.style.display = 'none';
    document.getElementById('buyukResim').src = '';
    document.getElementById('buyukResim').style.display = 'none';
}
</script>

</body>
</html>
